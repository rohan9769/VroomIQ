name: vroomiq
region: nyc

services:
  - name: backend
    github:
      repo: rohan9769/VroomIQ
      branch: main
      deploy_on_push: true
    source_dir: /backend
    dockerfile_path: /backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: QDRANT_URL
        scope: RUN_TIME
        value: REPLACE_ME
      - key: QDRANT_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        value: ${APP_URL}
    routes:
      - path: /api
        preserve_path_prefix: true
      - path: /health
        preserve_path_prefix: true

static_sites:
  - name: frontend
    github:
      repo: rohan9769/VroomIQ
      branch: main
      deploy_on_push: true
    source_dir: /frontend/web
    build_command: npm run build
    output_dir: dist
    routes:
      - path: /
    index_document: index.html
    error_document: index.html
